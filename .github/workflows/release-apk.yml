name: Build APK

# Builds an installable Android APK on GitHub's servers.
# - Manual run (workflow_dispatch): APK attached as a build artifact.
# - Tag push (v*): APK attached to a GitHub Release for permanent download.

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Platform folders are not committed; generate them. The explicit
      # project name matters: the repo directory name (HEALTH-WORKER-
      # ASSISTANT) is not a valid Dart package name.
      - name: Generate Android platform files
        run: flutter create --project-name healthworker --org org.healthworker --platforms android .

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk healthworker-${{ github.ref_name }}.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: healthworker-apk
          path: healthworker-*.apk

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: healthworker-*.apk
          generate_release_notes: true
