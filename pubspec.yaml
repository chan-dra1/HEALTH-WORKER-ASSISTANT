name: healthworker
description: Offline health assistant for community health workers.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.0
  path: ^1.8.0

  # UI Components
  fl_chart: ^0.63.0

  # NOTE: connectivity_plus / http will return when the optional sync
  # feature lands (v1.0 roadmap). Removed for now: unused, and
  # connectivity_plus v5 pins compileSdk 33, which breaks the Android
  # release build against current AndroidX (requires 34+).

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
