name: healthworker
description: Offline health assistant for community health workers.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.0
  path: ^1.8.0

  # UI Components
  fl_chart: ^0.63.0

  # Utilities
  intl: ^0.19.0
  provider: ^6.0.0
  http: ^1.1.0
  connectivity_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
